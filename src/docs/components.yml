components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
      example:
        id: 5ebac534954b54139806c112
        email: fake@example.com
        name: fake name
        role: user

    Token:
      type: object
      properties:
        token:
          type: string
        expires:
          type: string
          format: date-time
      example:
        token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI1ZWJhYzUzNDk1NGI1NDEzOTgwNmMxMTIiLCJpYXQiOjE1ODkyOTg0ODQsImV4cCI6MTU4OTMwMDI4NH0.m1U63blB0MLej_WfB7yC2FTMnCziif9X8yzwDEfJXAg
        expires: 2020-05-12T16:18:04.793Z

    AuthTokens:
      type: object
      properties:
        access:
          $ref: "#/components/schemas/Token"
        refresh:
          $ref: "#/components/schemas/Token"

    Error:
      type: object
      properties:
        code:
          type: number
        message:
          type: string
    Order:
      type: object
      properties:
        content_verticals:
          type: array
          items:
            type: string
        shoot_datetimes:
          type: array
          items:
            type: object
            properties:
              shoot_date_time:
                type: string
                format: date-time
              date_status:
                type: string
        order_status:
          type: string
        content_type:
          type: string
        vst:
          type: string
        location:
          type: string
        budget_range:
          type: string
        description:
          type: string
        shoot_duration:
          type: string
        id:
          type: string
      example:
        content_verticals: ["food", "travel"]
        shoot_datetimes:
          - shoot_date_time: "2022-01-01T10:00:00.000Z"
            date_status: "confirmed"
          - shoot_date_time: "2022-01-02T14:00:00.000Z"
            date_status: "pending"
        order_status: "pending"
        content_type: "photo"
        vst: "John Doe"
        location: "New York"
        budget_range: "$1000 - $2000"
        description: "Looking for a photographer to shoot food and travel photos in New York"
        shoot_duration: "4 hours"
        id: "64788963065d29209beca23f"

  responses:
    DuplicateEmail:
      description: Email already taken
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 400
            message: Email already taken
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 401
            message: Please authenticate
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 403
            message: Forbidden
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: 404
            message: Not found

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
